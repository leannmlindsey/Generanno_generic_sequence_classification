# GENERanno LAMBDA_v1 replication config.
#
# Sourced by:
#   slurm_scripts/lambda_replication/run_lambda_training.sh
#   slurm_scripts/lambda_replication/run_lambda_inference.sh
#   slurm_scripts/lambda_replication/check_training.sh
#   slurm_scripts/lambda_replication/check_inference.sh
#
# Workflow:
#   1. (one time) pre-warm the HF cache from a login node (see README.md).
#   2. bash slurm_scripts/lambda_replication/run_lambda_training.sh
#   3. wait for jobs to finish (squeue -u $USER); bash .../check_training.sh
#   4. bash slurm_scripts/lambda_replication/run_lambda_inference.sh
#   5. wait; bash .../check_inference.sh
#
# The pipeline loops over SEGMENT_LENGTHS. For each length it runs:
#   finetune x N seeds (training stage), then best-of-N seed selection by
#   test-set MCC -> winners.json, then inference on the matching-length
#   diagnostics (test/fpr/fnr/gc_control), genome-wide CSVs, and a pretrained
#   embedding analysis (linear probe + 3-layer NN). Outputs are per-length.
#
# This is an ORCHESTRATION layer with THIN job bodies (lambda_finetune_job.sh,
# lambda_inference_job.sh, lambda_embedding_job.sh) that call the EXISTING module
# entry points directly with explicit output control:
#   python -m src.tasks.downstream.{sequence_understanding,inference,embedding_analysis}
# Every output (training, inference, winners.json, embeddings) lands in the single
# canonical OUTPUT_DIR tree below. It does not modify any experiment code.

# --- REQUIRED -----------------------------------------------------------------

# LAMBDA_v1 dataset root. Expected structure (LAMBDA_v1 layout):
#   $LAMBDA_BASE/train_val_test/<LEN>/{train,val,test}.csv     mixed phage+bacteria
#   $LAMBDA_BASE/fpr_test/<LEN>/bacteria_segments_<LEN>.csv    bacteria-only (FPR control)
#   $LAMBDA_BASE/shuffled_controls/<LEN>/test_shuffled.csv     GC-preserving shuffled control
export LAMBDA_BASE="/work/hdd/bfzj/llindsey1/LAMBDA_REPLICATION/LAMBDA_v1"

# Replication output root. Per-length results land under here:
#   $OUTPUT_DIR/<LEN>/finetune/<variant>/seed-<N>/   test_results.json + best_model/
#   $OUTPUT_DIR/<LEN>/embedding/<variant>/           embedding_analysis results
#   $OUTPUT_DIR/<LEN>/winners.json                   picked by run_lambda_inference.sh
#   $OUTPUT_DIR/<LEN>/inference/<variant>/           canonical *_predictions.csv (+ _metrics.json)
#       test_predictions.csv, fpr_predictions.csv, gc_control_predictions.csv,
#       fnr_predictions.csv, genome_wide_<stem>_predictions.csv (harvest names)
#   $OUTPUT_DIR/logs/                                SLURM stdout/stderr (shared)
#
# Delta-AI: outputs live on /work/hdd (large; home /u is tiny and inode-limited,
# so nothing big goes there). The old Biowulf /data/lindseylm and /gpfs paths no
# longer exist for this account.
export OUTPUT_DIR="/work/hdd/bfzj/llindsey1/LAMBDA_REPLICATION/Generanno_generic_sequence_classification/outputs"

# Sequence lengths to run. GENERanno has an 8k base-pair context, so it supports
# 2k, 4k, AND 8k. Set to a single value (e.g. "2k") to run only one length.
export SEGMENT_LENGTHS="2k 4k 8k"

# --- OPTIONAL: diagnostics NOT in the train_val_test split -------------------

# FNR (false negative rate) test sets — phage-only sequences. Per-length CSV.
# Variable name is FNR_<LEN> where <LEN> matches an entry in SEGMENT_LENGTHS.
# Leave empty/unset to skip the FNR diagnostic for that length.
# NOTE: 2k uses the sliding-window segment set (phage_segments_2k_1k.csv),
# consistent with the 4k/8k sliding-window files. This is the FNR diagnostic and
# is DISTINCT from the PHROG diagnostic below, which uses the phrog-annotated CDS
# subset (phage_annotated_segments_2k.csv). Both are required; neither is wrong.
export FNR_2k="${LAMBDA_BASE}/fnr_test/2k/phage_segments_2k_1k.csv"          # VERIFIED in-dataset
export FNR_4k="${LAMBDA_BASE}/fnr_test/4k/phage_segments_4k_2k.csv"          # VERIFIED
export FNR_8k="${LAMBDA_BASE}/fnr_test/8k/phage_segments_8k_4k.csv"          # VERIFIED

# PHROG (phage-annotated) diagnostic — 2k ONLY. The phrog-annotated CDS subset
# (phage_annotated_segments_2k.csv), DISTINCT from the FNR sliding-window file
# above. Feeds the paper's PHROG category-sensitivity table. inference.py copies
# all input columns through (output_df = df.copy()), so the output carries
# phrog_db_category + pred_label that the PHROG table groups by. Per-length var
# PHROG_<LEN>; leave unset to skip.
export PHROG_2k="${LAMBDA_BASE}/fnr_test/2k/phage_annotated_segments_2k.csv"

# Model-prefixed name the central PHROG table reads:
#   ${PHROG_MODEL_TAG}_<input-stem>_predictions.csv
#   -> GENERanno_phage_annotated_segments_2k_predictions.csv
export PHROG_MODEL_TAG="GENERanno"

# Genome-wide inputs — per-length. Each is a DIRECTORY of *.csv segment files
# (one inference job per CSV; each emits genome_wide_<stem>_predictions.csv).
# Leave empty/unset to skip genome-wide.
# 2k / 4k / 8k directories are VERIFIED to exist in LAMBDA_v1. The inference
# driver still warn-and-skips any directory that happens to be missing or has no
# *.csv (defensive; not fatal).
export GENOME_WIDE_2k="${LAMBDA_BASE}/genome_wide/2k"   # VERIFIED
export GENOME_WIDE_4k="${LAMBDA_BASE}/genome_wide/4k"   # VERIFIED
export GENOME_WIDE_8k="${LAMBDA_BASE}/genome_wide/8k"   # VERIFIED

# FPR (bacteria-only) and GC control (shuffled) are AUTO-DERIVED by the inference
# driver from LAMBDA_BASE — NOT set here:
#   ${LAMBDA_BASE}/fpr_test/<LEN>/bacteria_segments_<LEN>.csv
#   ${LAMBDA_BASE}/shuffled_controls/<LEN>/test_shuffled.csv

# --- OPTIONAL: model + training hyperparameters ------------------------------

# GENERanno has a single architecture/checkpoint, so there is one "variant".
# Keeping the variant loop mirrors the ProkBERT/DNABERT-2 layout
# (outputs/<LEN>/finetune/<variant>/...).
export VARIANTS="generanno"

# HuggingFace base model used for every variant.
export BASE_MODEL="GenerTeam/GENERanno-prokaryote-0.5b-base"

# Random seeds for finetuning (one finetune job per variant per seed).
export SEEDS="1 2 3 4 5"

# Finetune hyperparameters. Defaults match Generanno's existing job scripts
# (run_generanno_csv.sh): lr=1e-5, batch=16, mcc as the selection metric,
# early stopping patience 5, d_output=2 (binary). The Generanno train script
# (sequence_understanding.py) uses early stopping rather than a fixed epoch
# count, so there is no NUM_EPOCHS here.
export LR="1e-5"
export BATCH_SIZE="16"
export D_OUTPUT="2"
export MAIN_METRICS="mcc"
export EARLY_STOPPING_PATIENCE="5"

# Per-window max token length (tokens). GENERanno uses a single-nucleotide
# (byte/character-level) tokenizer over A/C/G/T/N, so 1 bp ~= 1 token, and the
# model's context is 8k base pairs. Therefore MAX_LENGTH for a window is just
# the window's base-pair length (2000bp -> 2048, 4000bp -> 4096, 8000bp -> 8192,
# rounded up to the powers of two the existing scripts use; 8192 is GENERanno's
# full context and the default the existing job scripts ship with).
# ASSUMPTION: tune down if you see OOM at 8k batch=16.
export MAX_LENGTH_2k="2048"
export MAX_LENGTH_4k="4096"
export MAX_LENGTH_8k="8192"

# Embedding analysis hyperparameters (run_embedding_analysis.sh defaults).
export POOLING="mean"           # mean | max | cls
export EMB_SEED="42"
export NN_EPOCHS="100"
export NN_HIDDEN_DIM="256"
export NN_LR="0.001"

# Include a random-init baseline encoder alongside pretrained ("true"|"false").
# Overridable from the environment: pass INCLUDE_RANDOM_BASELINE=false to skip the
# random baseline (e.g. when re-running embedding only to save the probe artifacts —
# the random_* columns are already computed and are preserved by the merging JSON
# write in embedding_analysis.py, so nothing is lost).
export INCLUDE_RANDOM_BASELINE="${INCLUDE_RANDOM_BASELINE:-true}"

# --- OPTIONAL: inference -----------------------------------------------------

# Inference batch size + classification threshold (passed to inference.py).
export INF_BATCH_SIZE="16"
export THRESHOLD="0.5"

# --- OPTIONAL: SLURM resources -----------------------------------------------

# The thin job bodies do not hardcode SBATCH resource directives; the drivers
# pass these flags (account bfzj-dtai-gh, partition ghx4, 1 GPU, 8 cpus) when submitting each job body.
export FT_MEM="64g"
export FT_TIME="24:00:00"
export EMB_MEM="64g"
# Generous wall time — embedding extraction over the full train split at 8k is the
# long pole (~7-8h pretrained-only, ~15h with the random baseline). 2h/12h were too
# short and jobs hit the TIME LIMIT mid-run.
export EMB_TIME="24:00:00"
export INF_MEM="32g"
# Generous wall time — the big 8k diagnostic files (e.g. fpr, 36k rows) run ~5-6h at
# ~8.5 s/it; probe inference does the same embedding pass. The old 2:00:00 killed the
# 8k fpr job at 37%.
export INF_TIME="24:00:00"

# Conda environment that has torch + transformers for GENERanno.
# Delta-AI: this is a PREFIX env on /work (home is too small), so it is the full
# path, activated via `conda activate "$CONDA_ENV"`.
export CONDA_ENV="/work/hdd/bfzj/llindsey1/conda/envs/generanno"

# HuggingFace cache. MUST be on /work, not home (home /u is at its quota).
# Compute nodes may be offline, so pre-warm from a login node with
# prefetch_hf_cache.sh before submitting jobs.
export HF_HOME="/work/hdd/bfzj/llindsey1/LAMBDA_REPLICATION/hf_cache"
